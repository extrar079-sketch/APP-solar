<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Painel Solar</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #005A9C;
            --success-color: #2ECC71;
            --danger-color: #E74C3C;
            --bg-color: #F4F6F9;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container { max-width: 100%; margin: 0 auto; }
        header {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            margin-bottom: 15px;
            position: relative;
        }
        header h1 { margin: 0 0 5px 0; font-size: 20px; color: var(--primary-color); text-align: center; }
        .device-info { font-size: 11px; color: #7f8c8d; line-height: 1.4; text-align: center; }
        .btn-config { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; width: auto; padding: 0; color: #7f8c8d;}
        
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .card { background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); border-top: 4px solid var(--primary-color); }
        .card.full-width { grid-column: span 2; }
        .card.geracao { border-top-color: var(--success-color); }
        .card.consumo { border-top-color: var(--danger-color); }
        .card h3 { margin: 0 0 5px 0; font-size: 11px; color: #7f8c8d; text-transform: uppercase; }
        .card .value { font-size: 22px; font-weight: bold; }
        .card .unit { font-size: 11px; color: #95a5a6; }
        
        .chart-container, .form-container { background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); margin-bottom: 15px; }
        h2 { font-size: 16px; margin-top: 0; color: var(--primary-color); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 12px; font-weight: bold; }
        /* Tamanho de fonte em 16px impede o Android de forçar o zoom */
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; }
        
        /* Modal de Configurações */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <button class="btn-config" onclick="toggleModal(true)">⚙️</button>
        <h1>EcoMoni - Solar</h1>
        <div class="device-info">
            Inversor: <strong>WEG SIW300H</strong> (S/N: TA24B017813)<br>
            Integração API: <span id="api-status" style="color: #2ECC71; font-weight: bold;">● Conectado à Nuvem</span>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card geracao full-width">
            <h3>Geração Instantânea (FusionSolar)</h3>
