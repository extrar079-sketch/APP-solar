<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMoni - Monitoramento Solar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; color: #4CAF50; }
        .valor { font-size: 3rem; font-weight: bold; margin: 20px 0; color: #ffeb3b; }
        .status { font-size: 0.9rem; color: #aaa; min-height: 20px; }
        .detalhes { font-size: 0.85rem; color: #888; margin-top: 10px; }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

<div class="card">
    <h1>EcoMoni</h1>
    <div id="status-conexao" class="status">Iniciando conexão direta...</div>
    <div id="potencia-real" class="valor">0.0 kW</div>
    <div id="detalhes-planta" class="detalhes">Conectando ao nó europeu...</div>
    <button onclick="buscarDadosSolar()">Atualizar Agora</button>
</div>

<script>
async function buscarDadosSolar() {
    const statusDiv = document.getElementById("status-conexao");
    const potenciaDiv = document.getElementById("potencia-real");
    const detalhesDiv = document.getElementById("detalhes-planta");
    
    statusDiv.innerText = "Autenticando na Huawei...";
    
    // Proxy público para contornar o bloqueio de segurança CORS do navegador
    const proxyUrl = "https://api.allorigins.win/get?url=";
    const urlLogin = "https://region01eu5.fusionsolar.huawei.com/thirdData/login";
    
    const credenciais = {
        userName: "CRISTIANO_LENZI",
        systemCode: "solturi123"
    };

    try {
        // Passo 1: Login via Proxy
        const loginCompletoUrl = proxyUrl + encodeURIComponent(urlLogin);
        const respostaLogin = await fetch(loginCompletoUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(credenciais)
        });

        const jsonLoginWrapper = await respostaLogin.json();
        const dadosLogin = JSON.parse(jsonLoginWrapper.contents);
        
        if (dadosLogin.failCode) {
            statusDiv.innerText = "Falha no Login (" + dadosLogin.failCode + ")";
            detalhesDiv.innerText = "Verifique as credenciais da conta Norte.";
            return;
        }

        statusDiv.innerText = "Obtendo telemetria...";

        // Passo 2: Buscar dados da Planta de geração
        const urlDados = "https://region01eu5.fusionsolar.huawei.com/thirdData/getStationRealKpi";
        const dadosCompletoUrl = proxyUrl + encodeURIComponent(urlDados);
        
        const respostaDados = await fetch(dadosCompletoUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ stationCodes: "" })
        });

        const jsonDadosWrapper = await respostaDados.json();
        const dadosPlanta = JSON.parse(jsonDadosWrapper.contents);

        if (dadosPlanta && dadosPlanta.data && dadosPlanta.data.length > 0 && dadosPlanta.data[0].dataItemMap) {
            const mapa = dadosPlanta.data[0].dataItemMap;
            const activePower = mapa.active_power || 0;
            
            potenciaDiv.innerText = activePower.toFixed(2) + " kW";
            statusDiv.innerText = "Sistema Online";
            detalhesDiv.innerText = "Dados atualizados direto da Huawei!";
        } else {
            potenciaDiv.innerText = "0.00 kW";
            statusDiv.innerText = "Sem produção ativa";
            detalhesDiv.innerText = "Conectado. Aguardando atividade solar.";
        }

    } catch (erro) {
        console.error(erro);
        statusDiv.innerText = "Conexão Instável";
        detalhesDiv.innerText = "Use os dados móveis (4G/5G) se a sua operadora local restringir o tráfego.";
    }
}

// Executa automaticamente quando o site carrega no celular
window.onload = buscarDadosSolar;
</script>

</body>
</html>
