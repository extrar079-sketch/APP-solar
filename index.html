<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMoni - Monitoramento Solar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; color: #4CAF50; }
        .valor { font-size: 3rem; font-weight: bold; margin: 20px 0; color: #ffeb3b; }
        .status { font-size: 0.9rem; color: #aaa; min-height: 20px; }
        .detalhes { font-size: 0.85rem; color: #888; margin-top: 10px; }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

<div class="card">
    <h1>EcoMoni</h1>
    <div id="status-conexao" class="status">Aguardando comando...</div>
    <div id="potencia-real" class="valor">0.0 kW</div>
    <div id="detalhes-planta" class="detalhes">Pronto para conectar.</div>
    <button onclick="buscarDadosSolar()">Atualizar Agora</button>
</div>

<script>
async function buscarDadosSolar() {
    const statusDiv = document.getElementById("status-conexao");
    const potenciaDiv = document.getElementById("potencia-real");
    const detalhesDiv = document.getElementById("detalhes-planta");
    
    statusDiv.innerText = "Conectando ao nó...";
    
    // ThingProxy: Permite tráfego POST/JSON completo sem travar a requisição
    const proxyUrl = "https://thingproxy.freeboard.io/fetch/";
    const urlLogin = "https://region01eu5.fusionsolar.huawei.com/thirdData/login";
    const urlDados = "https://region01eu5.fusionsolar.huawei.com/thirdData/getStationRealKpi";
    
    const credenciais = {
        userName: "CRISTIANO_LENZI",
        systemCode: "solturi123"
    };

    try {
        // 1. Efetuar Login de forma limpa através do ThingProxy
        statusDiv.innerText = "Autenticando credenciais...";
        
        const respostaLogin = await fetch(proxyUrl + urlLogin, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(credenciais)
        });

        if (!respostaLogin.ok) {
            throw new Error("Erro no servidor Proxy/Huawei: " + respostaLogin.status);
        }

        const dadosLogin = await respostaLogin.json();
        
        if (dadosLogin.failCode) {
            statusDiv.innerText = "Erro no login: " + dadosLogin.failCode;
            detalhesDiv.innerText = "Verifique os dados da sua conta.";
            return;
        }

        // 2. Coletar os dados em tempo real da planta solar
        statusDiv.innerText = "Baixando telemetria...";
        
        const respostaDados = await fetch(proxyUrl + urlDados, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ stationCodes: "" })
        });

        const dadosPlanta = await respostaDados.json();

        if (dadosPlanta && dadosPlanta.data && dadosPlanta.data.length > 0 && dadosPlanta.data[0].dataItemMap) {
            const mapa = dadosPlanta.data[0].dataItemMap;
            const activePower = mapa.active_power || 0;
            
            potenciaDiv.innerText = activePower.toFixed(2) + " kW";
            statusDiv.innerText = "Conectado";
            detalhesDiv.innerText = "Leitura em tempo real atualizada!";
        } else {
            potenciaDiv.innerText = "0.00 kW";
            statusDiv.innerText = "Sem produção";
            detalhesDiv.innerText = "Inversor online, aguardando atividade solar.";
        }

    } catch (erro) {
        console.error(erro);
        statusDiv.innerText = "Falha na comunicação";
        detalhesDiv.innerText = "O servidor está temporariamente ocupado. Tente novamente.";
    }
}

// Executa automaticamente ao carregar a página no telemóvel
window.onload = buscarDadosSolar;
</script>

</body>
</html>
