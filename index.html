<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMoni - Monitoramento Solar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; color: #4CAF50; }
        .valor { font-size: 3rem; font-weight: bold; margin: 20px 0; color: #ffeb3b; }
        .status { font-size: 0.9rem; color: #aaa; min-height: 20px; }
        .detalhes { font-size: 0.85rem; color: #888; margin-top: 10px; }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

<div class="card">
    <h1>EcoMoni</h1>
    <div id="status-conexao" class="status">Iniciando conexão...</div>
    <div id="potencia-real" class="valor">0.0 kW</div>
    <div id="detalhes-planta" class="detalhes">Conectando via túnel dedicado...</div>
    <button onclick="buscarDadosSolar()">Atualizar Agora</button>
</div>

<script>
async function buscarDadosSolar() {
    const statusDiv = document.getElementById("status-conexao");
    const potenciaDiv = document.getElementById("potencia-real");
    const detalhesDiv = document.getElementById("detalhes-planta");
    
    statusDiv.innerText = "Conectando ao servidor...";
    
    // Lista de proxies de contingência (Se um falhar, o outro assume)
    const proxies = [
        "https://corsproxy.io/?",
        "https://api.allorigins.win/get?url="
    ];
    
    const urlLogin = "https://region01eu5.fusionsolar.huawei.com/thirdData/login";
    const urlDados = "https://region01eu5.fusionsolar.huawei.com/thirdData/getStationRealKpi";
    
    const credenciais = {
        userName: "CRISTIANO_LENZI",
        systemCode: "solturi123"
    };

    // Função interna para tentar fazer o fetch alternando os proxies se necessário
    async function requisicaoSolar(urlAlvo, corpo, usarWrapper = false) {
        let erroUltimo = null;
        
        for (let proxy de proxies) {
            try {
                let urlFinal = proxy + (proxy.includes("allorigins") ? encodeURIComponent(urlAlvo) : urlAlvo);
                
                let configs = {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(corpo),
                    mode: "cors"
                };
                
                // Se for allorigins, ele exige GET encapsulado
                if (proxy.includes("allorigins")) {
                    configs.method = "GET";
                    delete configs.body;
                    urlFinal = proxy + encodeURIComponent(urlAlvo + "?body=" + JSON.stringify(corpo));
                }

                const resposta = await fetch(urlFinal, configs);
                if (!resposta.ok) continue;
                
                const texto = await resposta.text();
                let json = JSON.parse(texto);
                
                // Trata o encapsulamento específico do allorigins
                if (proxy.includes("allorigins") && json.contents) {
                    json = JSON.parse(json.contents);
                }
                
                return json;
            } catch (e) {
                erroUltimo = e;
            }
        }
        throw erroUltimo || new Error("Falha em todos os túneis");
    }

    try {
        statusDiv.innerText = "Autenticando...";
        const dadosLogin = await requisicaoSolar(urlLogin, credenciais);
        
        if (dadosLogin.failCode) {
            statusDiv.innerText = "Acesso Negado (" + dadosLogin.failCode + ")";
            detalhesDiv.innerText = "Verifique o usuário/senha da conta.";
            return;
        }

        statusDiv.innerText = "Atualizando leitura...";
        const dadosPlanta = await requisicaoSolar(urlDados, { stationCodes: "" });

        if (dadosPlanta && dadosPlanta.data && dadosPlanta.data.length > 0 && dadosPlanta.data[0].dataItemMap) {
            const mapa = dadosPlanta.data[0].dataItemMap;
            const activePower = mapa.active_power || 0;
            
            potenciaDiv.innerText = activePower.toFixed(2) + " kW";
            statusDiv.innerText = "Atualizado";
            detalhesDiv.innerText = "Conexão direta estabelecida.";
        } else {
            potenciaDiv.innerText = "0.00 kW";
            statusDiv.innerText = "Sem produção";
            detalhesDiv.innerText = "Aguardando geração do inversor.";
        }

    } catch (erro) {
        console.error(erro);
        statusDiv.innerText = "Servidor Ocupado";
        detalhesDiv.innerText = "Toque em atualizar novamente em alguns segundos.";
    }
}

window.onload = buscarDadosSolar;
</script>
