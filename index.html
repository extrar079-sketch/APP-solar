<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMoni - Monitoramento Solar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; color: #4CAF50; }
        .valor { font-size: 3rem; font-weight: bold; margin: 20px 0; color: #ffeb3b; }
        .status { font-size: 0.9rem; color: #aaa; }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

<div class="card">
    <h1>EcoMoni</h1>
    <div id="status-conexao" class="status">Conectando diretamente à Huawei...</div>
    <div id="potencia-real" class="valor">0.0 kW</div>
    <div id="detalhes-planta" style="font-size: 0.85rem; color: #888;">Aguardando dados...</div>
    <button onclick="buscarDadosSolar()">Atualizar Agora</button>
</div>

<script>
async function buscarDadosSolar() {
    const statusDiv = document.getElementById("status-conexao");
    const potenciaDiv = document.getElementById("potencia-real");
    const detalhesDiv = document.getElementById("detalhes-planta");
    
    statusDiv.innerText = "Efetuando login seguro...";
    
    const urlLogin = "https://region01eu5.fusionsolar.huawei.com/thirdData/login";
    const credenciais = {
        userName: "CRISTIANO_LENZI",
        systemCode: "solturi123"
    };

    try {
        // Realiza o login direto do navegador do celular
        const respostaLogin = await fetch(urlLogin, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(credenciais)
        });

        if (!respostaLogin.ok) {
            throw new Error("Servidor Huawei retornou status " + respostaLogin.status);
        }

        const dadosLogin = await JSON.parse(await respostaLogin.text());
        
        if (dadosLogin.failCode) {
            statusDiv.innerText = "Erro nas credenciais da Huawei.";
            return;
        }

        statusDiv.innerText = "Buscando dados em tempo real...";

        // Rota pública de Estação/Planta integrada para puxar a geração ativa
        const urlDados = "https://region01eu5.fusionsolar.huawei.com/thirdData/getStationRealKpi";
        const respostaDados = await fetch(urlDados, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ stationCodes: "" })
        });

        const dadosPlanta = await JSON.parse(await respostaDados.text());

        if (dadosPlanta && dadosPlanta.data && dadosPlanta.data.length > 0 && dadosPlanta.data[0].dataItemMap) {
            const mapa = dadosPlanta.data[0].dataItemMap;
            const activePower = mapa.active_power || 0;
            
            potenciaDiv.innerText = activePower + " kW";
            statusDiv.innerText = "Online";
            detalhesDiv.innerText = "Planta conectada diretamente sem intermediários.";
        } else {
            potenciaDiv.innerText = "0.0 kW";
            statusDiv.innerText = "Sem geração";
            detalhesDiv.innerText = "Inversor conectado, mas sem produção ativa no momento.";
        }

    } catch (erro) {
        console.error(erro);
        statusDiv.innerText = "Erro de conexão local.";
        detalhesDiv.innerText = "Caso persista, certifique-se de testar usando os Dados Móveis (4G/5G).";
    }
}

// Executa a busca assim que o aplicativo abre
window.onload = buscarDadosSolar;
</script>

</body>
</html>
